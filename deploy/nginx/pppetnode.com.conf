# pppetnode.com 的 Nginx 反向代理配置
# 目标服务器：8.156.95.140

server {
    listen 80;
    listen [::]:80;
    server_name pppetnode.com www.pppetnode.com;

    return 301 https://pppetnode.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pppetnode.com www.pppetnode.com;

    ssl_certificate /etc/letsencrypt/live/pppetnode.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pppetnode.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

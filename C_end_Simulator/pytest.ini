# ──────────────────────────────────────────────────────────────
# pytest.ini —— 测试框架配置
#
# PetNode 使用 pytest 作为测试框架。
# 此配置定义了自定义标记 (marker)，用于分类测试：
#   - docker: 需要 Docker 环境的测试（如镜像构建、容器运行验证）
#
# 运行方式：
#   cd C_end_Simulator
#   pytest                    # 运行所有非 Docker 测试
#   pytest -m docker          # 仅运行 Docker 相关测试
#   pytest -m "not docker"    # 排除 Docker 相关测试
#   pytest -v                 # 详细模式（显示每个测试用例名称）
# ──────────────────────────────────────────────────────────────

[pytest]
markers =
    docker: 需要 Docker 环境的测试（使用 pytest -m docker 运行）

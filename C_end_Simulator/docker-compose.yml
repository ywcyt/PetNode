# ──────────────────────────────────────────────────────────────
# docker-compose.yml —— PetNode C端模拟系统的容器编排配置
#
# 编排了两个服务：
#   1. engine : 核心引擎容器（后台常驻，持续生成模拟数据）
#   2. tui    : TUI 终端监控容器（按需启动，通过 profile 控制）
#
# 两个容器通过 output_data/ 共享卷（bind mount）进行通信：
#   - Engine 写入数据文件 → TUI 读取并展示
#   - TUI 写入控制指令 → Engine 轮询并执行
#
# 使用方式：
#   docker compose up -d engine          # 后台启动引擎
#   docker compose --profile tui run --rm tui  # 交互式启动 TUI
#   docker compose down                  # 停止所有服务
#
# 注意：
#   - GUI (ui_gui/) 不在此编排中——它依赖宿主机图形环境，
#     需要在宿主机上直接运行 python -m ui_gui.app
#   - TUI 使用 profile 机制，默认不启动，需要显式指定 --profile tui
# ──────────────────────────────────────────────────────────────

services:
  # ─────────── RabbitMQ（消息队列：Engine → Worker → Storage）───────────
  # 用途：
  #   - Engine 作为 producer 将 record 写入队列
  #   - mq-worker 作为 consumer 从队列取出 record，完成鉴权/验签后写入 MongoStorage
  # 好处：
  #   - 解耦生产与消费（Flask API 不再是唯一入口）
  #   - 天然具备 ACK/NACK + 重投递能力（用于“重传机制”）
  rabbitmq:
    image: rabbitmq:3-management
    container_name: petnode-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # 管理台（http://localhost:15672，默认 guest/guest）
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 15s
      retries: 5

  # ─────────── MongoDB（Flask 数据持久化存储）───────────
  mongodb:
    image: mongo:7
    container_name: petnode-mongodb
    restart: unless-stopped
    # 端口映射仅用于宿主机调试（例如用 MongoDB Compass 连接）。
    # 如果不需要对外暴露，可注释掉。
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────── MySQL（数据库存储：按日期保存数据）───────────
  mysql:
    image: mysql:8
    container_name: petnode-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"                          # MySQL 标准端口
    environment:
      - MYSQL_ROOT_PASSWORD=REPLACE_WITH_YOUR_MYSQL_ROOT_PASSWORD  # root 用户密码
      - MYSQL_DATABASE=petnode               # 初始化数据库名
      - MYSQL_USER=REPLACE_WITH_YOUR_MYSQL_USER              # 普通用户
      - MYSQL_PASSWORD=REPLACE_WITH_YOUR_MYSQL_PASSWORD # 普通用户密码
      - TZ=UTC                               # 时区设置为 UTC
    volumes:
      - mysql_data:/var/lib/mysql            # 数据持久化
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────── S端 Flask 数据服务器（必须先于 Engine 启动）───────────
  flask-server:
    build:
      context: .                              # 构建上下文为 C_end_Simulator/ 目录
      dockerfile: flask_server/Dockerfile     # 使用 flask_server 专属 Dockerfile
    container_name: petnode-flask              # 容器名称
    restart: unless-stopped                   # 崩溃时自动重启
    ports:
      - "5000:5000"                           # 宿主机 5000 → 容器 5000（方便调试）
    environment:
      - PYTHONUNBUFFERED=1                    # 禁用 Python 输出缓冲
      # MongoStorage 配置（默认启用）
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=petnode
      - MONGO_COLLECTION=received_records

      # MySQLStorage 配置（当 STORAGE_BACKEND=mysql 时使用）
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=petnode
      - MYSQL_USER=REPLACE_WITH_YOUR_MYSQL_USER
      - MYSQL_PASSWORD=REPLACE_WITH_YOUR_MYSQL_PASSWORD
      - MYSQL_DEFAULT_USERNAME=petnode_admin
      - MYSQL_DEFAULT_PASSWORD_HASH=REPLACE_WITH_YOUR_MYSQL_DEFAULT_PASSWORD_HASH
      - MYSQL_CHARSET=utf8mb4

      - PORT=5000                             # Flask 监听端口
      - JWT_SECRET=REPLACE_WITH_STRONG_RANDOM_JWT_SECRET # vx API JWT 签名密钥（生产必须替换）
      - WECHAT_APP_ID=REPLACE_WITH_YOUR_WECHAT_APP_ID # 微信小程序 AppID（真实 vx 必填）
      - WECHAT_APP_SECRET=REPLACE_WITH_YOUR_WECHAT_APP_SECRET # 微信小程序 AppSecret（真实 vx 必填）
      # API_KEY/HMAC_KEY 在 flask-server / mq-worker / engine 三处必须一致
      - API_KEY=REPLACE_WITH_SHARED_API_KEY
      - HMAC_KEY=REPLACE_WITH_SHARED_HMAC_KEY
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')" ]
      interval: 10s                           # 每 10 秒检查一次
      timeout: 5s                             # 超时 5 秒
      retries: 3                              # 连续 3 次失败才标记为 unhealthy
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy

  # ─────────── MQ Worker（队列消费者：验签 + 入库）───────────
  # 注意：这里使用与 flask-server 相同的镜像构建上下文（同一份代码/依赖）。
  # 但运行命令不同：mq-worker 不提供 HTTP，只消费 RabbitMQ。
  mq-worker:
    build:
      context: .
      dockerfile: flask_server/Dockerfile
    container_name: petnode-mq-worker
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=petnode
      - MONGO_COLLECTION=received_records
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=petnode
      - MYSQL_USER=REPLACE_WITH_YOUR_MYSQL_USER
      - MYSQL_PASSWORD=REPLACE_WITH_YOUR_MYSQL_PASSWORD
      - MYSQL_DEFAULT_USERNAME=petnode_admin
      - MYSQL_DEFAULT_PASSWORD_HASH=REPLACE_WITH_YOUR_MYSQL_DEFAULT_PASSWORD_HASH
      - MYSQL_CHARSET=utf8mb4
      # API_KEY/HMAC_KEY 在 flask-server / mq-worker / engine 三处必须一致
      - API_KEY=REPLACE_WITH_SHARED_API_KEY
      - HMAC_KEY=REPLACE_WITH_SHARED_HMAC_KEY
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - RABBITMQ_QUEUE=petnode.records
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    command: ["python", "-m", "flask_server.mq_worker"]
  # ─────────── 核心引擎容器（后台常驻，持续生成数据）───────────
  engine:
    build:
      context: .                        # 构建上下文为 C_end_Simulator/ 目录
      dockerfile: engine/Dockerfile     # 使用 engine 专属 Dockerfile
    container_name: petnode-engine       # 容器名称（便于识别）
    restart: unless-stopped             # 崩溃时自动重启（除非手动停止）
    volumes:
      # bind mount: 将宿主机 output_data/ 映射到容器内 /app/output_data/
      # 这是 Engine 与 TUI/GUI 之间的"数据桥梁"
      - ./output_data:/app/output_data
    environment:
      - PYTHONUNBUFFERED=1              # 禁用 Python 输出缓冲（确保日志实时输出）
      - API_URL=http://flask-server:5000/api/data
      # API_KEY/HMAC_KEY 在 flask-server / mq-worker / engine 三处必须一致
      - API_KEY=REPLACE_WITH_SHARED_API_KEY
      - HMAC_KEY=REPLACE_WITH_SHARED_HMAC_KEY
      # 消息队列配置（当 EXPORT_BACKEND=mq 时生效）
      - EXPORT_BACKEND=mq
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - RABBITMQ_QUEUE=petnode.records
    # 默认参数：2 只狗，200 ticks，每 1 秒一轮，种子 42
    # 可在此处修改参数来调整模拟行为
    command: ["--dogs", "2", "--ticks", "200", "--interval", "1", "--seed", "42", "--output-dir", "/app/output_data"]
      # ... 其他配置不变 ...
    depends_on:
      flask-server:
        condition: service_healthy    # 等 Flask 健康检查通过后再启动 Engine
      rabbitmq:
        condition: service_healthy
      mq-worker:
        condition: service_started

  # ─────────── TUI 终端监控界面容器（PetNodeOS）───────────
  # 使用 Docker profile 机制——默认不随 docker compose up 启动，
  # 需要显式指定 --profile tui 才会构建和运行
  # 启动方式: docker compose --profile tui run --rm tui
  #
  # 关键配置解释：
  #   - stdin_open: true  → 保持容器标准输入打开（等价于 docker run -i）
  #   - tty: true         → 分配伪终端 PTY（等价于 docker run -t）
  #   - 以上两项是让 Textual TUI 在 Docker 中正常渲染交互界面的必要条件
  #   - depends_on: engine → 确保 Engine 先启动
  #   - --rm              → 退出后自动删除容器（TUI 是一次性交互会话）
  tui:
    build:
      context: .                        # 构建上下文为 C_end_Simulator/ 目录
      dockerfile: ui_tui/Dockerfile     # 使用 TUI 专属 Dockerfile
    container_name: petnode-tui
    stdin_open: true                    # 保持标准输入（-i），Textual 需要接收键盘输入
    tty: true                           # 分配伪终端（-t），Textual 需要 TTY 来渲染全屏 UI
    volumes:
      # 与 Engine 共享同一个 output_data/ 目录（读数据 + 写指令）
      - ./output_data:/app/output_data
    depends_on:
      - engine                          # TUI 依赖 Engine（先启动引擎才有数据可看）
    command: ["--output-dir", "/app/output_data"]
    profiles:
      - tui                             # 归入 tui profile，默认不启动

volumes:
  mongo_data:
  rabbitmq_data:
  mysql_data:
